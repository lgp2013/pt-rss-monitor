version: '3.8'

services:
  pt-rss-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pt-rss-monitor
    ports:
      - "3000:3000"
    volumes:
      - pt-rss-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/pt-rss-monitor.json
    restart: unless-stopped

volumes:
  pt-rss-data:
