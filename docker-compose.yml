services:
  pt-rss-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pt-rss-monitor
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/pt-rss-monitor.json
      FRONTEND_DIST: /app/frontend-dist
    volumes:
      - pt-rss-monitor-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pt-rss-monitor-data:
